# Builds the Windows installer in CI and publishes it as a GitHub Release on every tag push (v*).
# The build job produces an UNSIGNED bundle. Once SignPath is configured (SIGNPATH_ORGANIZATION_ID
# variable + SIGNPATH_API_TOKEN secret) the sign job submits it to SignPath and the release ships signed;
# until then the release is unsigned. The signing key never lives in the repo or on the runner
# (installer.config.ci.json sets signingCert = null, so the local signtool path is skipped).
name: build & sign release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # attach the signed installer to the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout (submodules + tags)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # engine version = `git describe --tags` of the amneziawg-windows submodule

      - name: Build the AmneziaWG engine (tunnel.dll)
        # build.cmd bootstraps Go + llvm-mingw into .deps and emits x64\tunnel.dll. The DLL is gitignored
        # (a build output, not vendored), so it must be built here before the .NET publish consumes it.
        working-directory: amneziageo-desktop/windows/amneziawg-windows
        shell: cmd
        run: build.cmd

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # WiX v4/v5 is restored as an MSBuild SDK via the .wixproj PackageReferences during `dotnet build`.
      # If a real run reports a missing extension, add: `dotnet tool install --global wix` here.

      - name: Build installer (unsigned)
        shell: pwsh
        # `ci` selects installer.config.ci.json (signingCert = null) so the local signtool path is skipped.
        # On a tag push the version comes from the tag (v1.2.3.4 -> 1.2.3.4; use a 4-field tag); otherwise
        # build-installer falls back to 1.0.1.<commit-count>.
        run: |
          $verArg = if ("$env:GITHUB_REF" -like 'refs/tags/v*') { @('-Version', ("$env:GITHUB_REF_NAME" -replace '^v','')) } else { @() }
          amneziageo-desktop/windows/AmneziaGeo.Windows.Installer.Bundle/build-installer.ps1 ci @verArg -Arch x64 -SelfContained false

      - name: Upload unsigned installer
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: amneziageo-desktop/windows/AmneziaGeo.Windows.Installer.Bundle/dist/*.exe
          if-no-files-found: error

  sign:
    needs: build
    runs-on: ubuntu-latest
    # Skipped until SignPath is wired up: gated on the SIGNPATH_ORGANIZATION_ID repository variable so the
    # release pipeline still publishes an unsigned installer in the meantime. Set the variable (and the
    # SIGNPATH_API_TOKEN secret) to activate signing.
    if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
    # Activates once the SignPath GitHub App is installed on the repo and the project is approved.
    # On SignPath configure: an organization, project `amneziageo`, a signing policy, and an artifact
    # configuration for the WiX Burn bundle (SignPath handles the engine detach/reattach). Then add the
    # SIGNPATH_API_TOKEN repository secret and the SIGNPATH_ORGANIZATION_ID variable. Input names/version
    # may need adjusting to the installed action release - see https://about.signpath.io/documentation.
    steps:
      - name: Submit to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: amneziageo
          signing-policy-slug: release-signing
          artifact-configuration-slug: installer
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-signed
          path: signed/*.exe
          if-no-files-found: error

  # Publishes the GitHub Release that the app's auto-update reads. update.json + AmneziaGeoSetup.exe are
  # attached as assets; the app polls https://github.com/<repo>/releases/latest/download/update.json and
  # resolves `setup` relative to it. Runs on a tag push once the build succeeded, whether or not signing
  # ran, preferring the signed installer and falling back to the unsigned one.
  publish:
    needs: [build, sign]
    runs-on: ubuntu-latest
    # Runs on every tag push once the build succeeded, whether or not the sign job ran: it prefers the
    # signed installer and falls back to the unsigned one. Until SignPath is active the release is unsigned.
    if: ${{ always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Download signed installer (if present)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: installer-signed
          path: signed

      - name: Download unsigned installer
        uses: actions/download-artifact@v4
        with:
          name: installer-unsigned
          path: unsigned

      - name: Build update manifest and setup asset
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G "signed/*.exe" > /dev/null; then
            EXE=$(ls signed/*.exe | head -1); echo "using SIGNED installer: $EXE"
          else
            EXE=$(ls unsigned/*.exe | head -1); echo "using UNSIGNED installer: $EXE"
          fi
          VER=$(basename "$EXE" | sed -n 's/^AmneziaGeo-\(.*\)-win-.*/\1/p')
          [ -n "$VER" ] || { echo "cannot parse version from $(basename "$EXE")"; exit 1; }
          cp "$EXE" AmneziaGeoSetup.exe
          printf '{\n  "version": "%s",\n  "description": "AmneziaGeo %s",\n  "setup": "AmneziaGeoSetup.exe"\n}\n' "$VER" "$VER" > update.json
          echo "VER=$VER" >> "$GITHUB_ENV"
          echo "--- update.json ---"; cat update.json

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --latest --title "AmneziaGeo ${VER}" --notes "AmneziaGeo ${VER}" AmneziaGeoSetup.exe update.json \
            || gh release upload "$TAG" AmneziaGeoSetup.exe update.json --clobber
